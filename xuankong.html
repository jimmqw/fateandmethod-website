    <h1>Xuan Kong <em>(奇门遁甲)</em><br>Secret Gate Numerology</h1>
    <p class="page-hero-sub">The most tactical of all Chinese divination systems — mapping the optimal energy of any moment across time and space.</p>
</header>

<div class="article-layout">
    <main class="article-content">

        <p class="article-lead">
            Xuan Kong (奇门遁甲), or Secret Gate Numerology, is perhaps the most tactical of all Chinese divination systems. Developed for military use in ancient China, it maps the optimal energy of any given moment across nine palaces, identifying <strong>favorable directions, timing windows, and strategic positions</strong>. Today it is widely applied in Feng Shui selection, business launches, and choosing the right moment to act.
        </p>

        <h2 id="what-is-xuankong">What is Xuan Kong?</h2>
        <p>
            Xuan Kong is fundamentally a <strong>system of timing and direction</strong>. Where other divination systems describe the quality of a situation (&ldquo;what will happen&rdquo;), Xuan Kong goes further: it identifies <em>when</em> energy is most favorable and <em>where</em> — in which direction, in which space — you should position yourself to work with it.
        </p>
        <p>
            The name itself reveals its military origins: <em>Xuan</em> (玄) means mysterious or dark, <em>Men</em> (门) means gate, and <em>Dun</em> (遁) means to escape or conceal. <em>Jia</em> (甲) is the first Celestial Stem — the Yang Wood energy that initiates action. Together, the name describes a system for concealing one&rsquo;s true direction (protecting the Jia energy) while exploiting the openings in the cosmic pattern.
        </p>
        <p>
            In practical modern use, Xuan Kong is the system of choice for: choosing a wedding date, selecting an office location, determining the best direction to face during an important meeting, and launching a new product at the optimal time window.
        </p>

        <h2 id="nine-palaces">The Nine Palaces (九宫)</h2>
        <p>
            The Nine Palaces form the spatial foundation of Xuan Kong — a 3&times;3 grid corresponding to the nine directions (center + eight cardinal and intercardinal directions). Each palace carries a distinct energy quality.
        </p>
        <div class="grid-9">
            <div class="grid-item"><h4>Xun (巽)</h4><p>Southeast — Growth, flexibility</p></div>
            <div class="grid-item"><h4>Li (离)</h4><p>South — Brightness, clarity</p></div>
            <div class="grid-item"><h4>Kun (坤)</h4><p>Southwest — Receptivity, earth</p></div>
            <div class="grid-item"><h4>Zhen (震)</h4><p>East — Movement, thunder</p></div>
            <div class="grid-item"><h4>Zhong (中)</h4><p>Center — Stability, the pivot</p></div>
            <div class="grid-item"><h4>Qian (乾)</h4><p>West — Creativity, heaven</p></div>
            <div class="grid-item"><h4>Xun (艮)</h4><p>Northeast — Mountain, stillness</p></div>
            <div class="grid-item"><h4>Gen (坎)</h4><p>North — Water, depth</p></div>
            <div class="grid-item"><h4>Qian (兑)</h4><p>Northwest — Metal, heaven&rsquo;s command</p></div>
        </div>

        <h2 id="eight-gates">The Eight Gates (八门)</h2>
        <p>
            The Eight Gates are the active agents in a Xuan Kong chart — they represent the type of energy available in each palace at a given time.
        </p>
        <div class="grid-3">
            <div class="grid-item"><h4>Sheng Men (生门)</h4><p>Life Gate — The most favorable. Vitality, new beginnings, healing. Ideal for starting new ventures.</p></div>
            <div class="grid-item"><h4>Jing Men (景门)</h4><p>Scenery Gate — Visibility, recognition. Good for presentations, marketing, going public.</p></div>
            <div class="grid-item"><h4>Du Men (杜门)</h4><p>Delight Gate — Joy, gathering. Social events, celebrations, partnership formation.</p></div>
            <div class="grid-item"><h4>Xiu Men (休门)</h4><p>Rest Gate — Rest, recovery. Suitable for consolidation, not for launching.</p></div>
            <div class="grid-item"><h4>Si Men (死门)</h4><p>Death Gate — Avoid. Represents loss, termination, closure. Not for new ventures.</p></div>
            <div class="grid-item"><h4>Jin Men (惊门)</h4><p>Injury Gate — Danger, loss. Particularly unfavorable for health and finances.</p></div>
            <div class="grid-item"><h4>Chu Men (开门)</h4><p>Out Gate — Departure, external activity. Suitable for travel, relocation.</p></div>
            <div class="grid-item"><h4>Wu Men (武门)</h4><p>Calamity Gate — Misfortune, instability. The worst gate for any significant action.</p></div>
        </div>

        <h2 id="nine-stars">The Nine Stars (九星)</h2>
        <p>
            The Nine Stars add a layer of celestial influence to the chart — each star carries an archetypal energy that modifies the gate it occupies.
        </p>
        <div class="grid-3">
            <div class="grid-item"><h4>Kam (禽)</h4><p>Pike Battle — Aggression, direct conflict. Both weapon and tool.</p></div>
            <div class="grid-item"><h4>Lu Chun (禄存)</h4><p>Six Jia — Hidden Jia energy. The protective &ldquo;hidden commander.&rdquo;</p></div>
            <div class="grid-item"><h4>Yong (巨)</h4><p>Six He — Cooperation, harmony. Favorable for negotiations.</p></div>
            <div class="grid-item"><h4>Wen (文)</h4><p>Scholar Star — Intelligence, education, creative output.</p></div>
            <div class="grid-item"><h4>Lian (廉)</h4><p>Clean Star — Purity, frugality. Austere but clean energy.</p></div>
            <div class="grid-item"><h4>Wu (武)</h4><p>Martial Star — Conflict, competition, trial. Legal matters.</p></div>
            <div class="grid-item"><h4>Pei (配)</h4><p>Assailant Star — Hidden attacker, espionage. Caution advised.</p></div>
            <div class="grid-item"><h4>Zuo (左辅)</h4><p>Left Duke — Noble assistance, protection from authority.</p></div>
            <div class="grid-item"><h4>You (右弼)</h4><p>Right Duke — Institutional support, official channels.</p></div>
        </div>

        <h2 id="twenty-four-qi">The 24 Qi Sections (24节气)</h2>
        <p>
            Xuan Kong integrates the 24 Solar Terms (24节气) of the Chinese agricultural calendar into its timing framework. Each solar term lasts approximately 15 days and marks a shift in the dominant Qi energy of the season. Xuan Kong readings take the current solar term into account — the same hexagram or palace can have very different meanings in different seasons.
        </p>
        <p>
            This integration is what makes Xuan Kong particularly powerful for <strong>agricultural, health, and seasonal timing decisions</strong>. A Xuan Kong practitioner knows not just what day is favorable, but what the seasonal Qi will do to that favorability — a deep layer of nuance absent in simpler systems.
        </p>

        <h2 id="fengshui">Xuan Kong in Feng Shui (选址)</h2>
        <p>
            Modern Feng Shui extensively incorporates Xuan Kong principles for <strong>site selection and directional analysis</strong>. When choosing a home or office:
        </p>
        <ul style="margin:12px 0 20px 24px;color:var(--text-muted)">
            <li>The facing direction of a building places it in a specific Xuan Kong palace</li>
            <li>The gate door location determines which of the Eight Gates governs the property</li>
            <li>The time of construction or renovation determines which Nine Star configuration is active</li>
        </ul>
        <p>
            Practitioners use Xuan Kong Flying Star charts to analyze existing buildings and identify which periods of time will be most and least favorable for the occupants — a practice called <em>Xuan Kong Fei Xing</em> (玄空飞星).
        </p>
        <div class="callout">
            <p><strong>Business application:</strong> A company launching a new product might use Xuan Kong to select both the optimal launch date and the optimal launch location (which direction the product should face in the room, which market to target geographically). This level of tactical specificity is what sets Xuan Kong apart from more general systems.</p>
        </div>
