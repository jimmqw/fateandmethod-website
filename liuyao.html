    <h1>Liu Yao <em>(六爻)</em><br>The I Ching Coin Oracle</h1>
    <p class="page-hero-sub">Three coins. Six throws. One precise answer to your most pressing question.</p>
</header>

<div class="article-layout">
    <main class="article-content">

        <p class="article-lead">
            Liu Yao (六爻), or Six Lines divination, is one of the most elegant and immediate forms of I Ching-based fortune telling. Using three coins thrown six times, it generates a hexagram that maps to one of 64 possible scenarios. Unlike Zi Wei which describes a whole life, Liu Yao answers a <strong>SPECIFIC QUESTION at a SPECIFIC MOMENT</strong>.
        </p>

        <h2 id="what-is-liuyao">What is Liu Yao?</h2>
        <p>
            Liu Yao belongs to the family of systems that grew from the <em>Yí Jīng</em> (I Ching, 易经) — the ancient Book of Changes. Where the traditional I Ching requires hexagram building through yarrow stalks (a process that can take 20+ minutes), Liu Yao distills the same wisdom into a rapid three-coin method.
        </p>
        <p>
            The system is elegant in its simplicity: <strong>three coins, six throws, one question.</strong> Each throw produces a <em>yào</em> (line) — either yang (solid, &#x2014;) or yin (broken, &#x2013;&#x2013;). After six throws, you have a six-line figure called a <em>guà</em> (hexagram). The hexagram maps to one of 64 classic configurations, each with its own interpretive text, judgment, and line commentaries.
        </p>
        <p>
            The power of Liu Yao lies in its <strong>immediacy and specificity</strong>. Because the reading is anchored to the exact moment of the question — the time, the mental state, the circumstances — practitioners report a synchronicity that feels uncanny. The question shapes the throw, and the throw reflects back the current state of the situation.
        </p>

        <h2 id="eight-trigrams">The 8 Trigrams</h2>
        <p>
            The 8 trigrams (八卦, Bā Guà) are the building blocks of all 64 hexagrams. Each trigram has a name, a symbolic image, and an elemental association.
        </p>
        <div class="concept-grid">
            <div class="concept-item"><div class="concept-symbol">&#x2610;</div><div class="concept-name">Qián — Heaven</div><div class="concept-meaning">Creative force, strength, pure yang — 三条实线</div></div>
            <div class="concept-item"><div class="concept-symbol">&#x2611;</div><div class="concept-name">Kūn — Earth</div><div class="concept-meaning">Receptive force, devotion, pure yin — 三条虚线</div></div>
            <div class="concept-item"><div class="concept-symbol">&#x2691;</div><div class="concept-name">Zhèn — Thunder</div><div class="concept-meaning">Arousal, movement, initiative — 一阳在二阴之下</div></div>
            <div class="concept-item"><div class="concept-symbol">&#x2690;</div><div class="concept-name">Xùn — Wind</div><div class="concept-meaning">Gentle penetration, infiltration — 一阴在二阳之下</div></div>
            <div class="concept-item"><div class="concept-symbol">&#x2609;</div><div class="concept-name">Lí — Fire</div><div class="concept-meaning">Clarity, radiance,依附 — 一阴在二阳之中</div></div>
            <div class="concept-item"><div class="concept-symbol">&#x263D;</div><div class="concept-name">Kǎn — Water</div><div class="concept-meaning">Danger, pit, followers — 一阳在二阴之中</div></div>
            <div class="concept-item"><div class="concept-symbol">&#x263C;</div><div class="concept-name">Gèn — Mountain</div><div class="concept-meaning">Stillness, rest, boundation — 一阳在二阴之上</div></div>
            <div class="concept-item"><div class="concept-symbol">&#x2600;</div><div class="concept-name">Duì — Lake</div><div class="concept-meaning">Joy, satisfaction, 愉悦 — 一阴在二阳之上</div></div>
        </div>

        <h2 id="how-to-cast">How to Cast</h2>
        <p>
            The casting procedure is deliberately simple, which is part of its power. The focus should be entirely on the question during each throw.
        </p>
        <ol class="step-list">
            <li><strong>Formulate your question clearly.</strong> Liu Yao excels at specific questions — "Should I accept this job offer by Friday?" or "Is my business partner being honest with me?" Vague questions produce vague answers.</li>
            <li><strong>Hold three coins in both hands.</strong> Traditional Chinese coins (with square holes) are preferred, but any three identical coins work.</li>
            <li><strong>Focus on your question and throw the coins.</strong> Let them fall naturally. Note the result: heads = 3, tails = 2.</li>
            <li><strong>Record each result as a line.</strong> Total 9 = yang (solid line, &#x2014;), Total 8 = yin (broken line, &#x2013;&#x2013;). 7 and 6 produce moving lines — this is where the depth of Liu Yao lives.</li>
            <li><strong>Repeat six times.</strong> From bottom to top, each throw becomes one line of your hexagram.</li>
        </ol>
        <div class="callout">
            <p><strong>Line values:</strong> 7 = yang stable &nbsp;|&nbsp; 6 = yang moving &nbsp;|&nbsp; 9 = yang stable &nbsp;|&nbsp; 8 = yin stable &nbsp;|&nbsp; The conventional scoring: heads = 3, tails = 2. Sum 7 or 9 = yang; 6 or 8 = yin. Moving lines become changing lines in the second hexagram (the "future" hexagram).</p>
        </div>

        <h2 id="interpreting">Interpreting the Hexagram</h2>
        <p>
            Once you have your hexagram, interpretation follows a layered approach:
        </p>
        <p><strong>1. The primary hexagram</strong> — The core energy of the situation as it exists now. Read the judgment (彖辞, Tuàn) for the overall trajectory.</p>
        <p><strong>2. The changing lines</strong> — Lines marked 6 or 9 carry specific commentary and represent active forces within the situation. They tell you where the energy is shifting.</p>
        <p><strong>3. The future hexagram</strong> — The hexagram formed by converting all moving lines. This represents the direction the situation is heading if current forces remain in motion.</p>
        <p><strong>4. The title trigrams</strong> — The upper and lower trigram of your hexagram carry their own symbolic weight. Heaven over Lake speaks of creative joy; Mountain over Earth speaks of stillness beneath receptivity.</p>

        <h2 id="vs-iching">Liu Yao vs I Ching: What&rsquo;s the Difference?</h2>
        <p>
            Both systems produce hexagrams from the same 64-figure vocabulary, but the experience of using them is quite different:
        </p>
        <p><strong>Method:</strong> The I Ching traditionally uses 50 yarrow stalks in a complex sorting ritual that takes 15&ndash;30 minutes. Liu Yao uses three coins and takes 2&ndash;3 minutes. Both are considered equally valid; the coin method was actually developed by Song Dynasty masters as a shortcut.</p>
        <p><strong>Speed vs Depth:</strong> Liu Yao sacrifices some of the meditative quality of the full I Ching ritual but gains immediacy. For practitioners who cast multiple times per day, Liu Yao is far more practical.</p>
        <p><strong>Moving lines:</strong> In classical I Ching, moving lines are the primary source of change interpretation. Liu Yao inherits this fully. Some modern coin I Ching interpretations ignore moving lines entirely — this is a significant loss of depth.</p>

        <h2 id="void">The Role of the &ldquo;Void&rdquo; (空亡)</h2>
        <p>
            One of the most distinctive and important concepts in Liu Yao (and in Da Liu Ren) is <em>kōng wáng</em> (空亡) — the Void or Empty. This refers to specific earthly branches that are "empty" of heavenly stems at a given time period.
        </p>
        <p>
            When a reading shows branches in the Void, it signals <strong>uncertainty, instability, or timing that is not yet set</strong>. It is one of the most important modifiers in a Liu Yao reading — a hexagram that looks strongly positive can be softened significantly if the relevant branches fall in the Void.
        </p>
        <p>
            Practitioners use the Void to assess whether the timing of a matter is ripe or premature — a critical signal when making decisions with deadlines.
        </p>

        <h2 id="when-to-use">When to Use Liu Yao (and When Not To)</h2>
        <p>
            Liu Yao is at its best when the question is <strong>specific, immediate, and consequential</strong>. It is less suited to broad life questions ("what is my purpose?") and excels at targeted ones ("should I close this deal before the end of the month?").
        </p>
        <p><strong>Best uses:</strong></p>
        <ul style="margin:12px 0 20px 24px;color:var(--text-muted)">
            <li>Timing decisions — when to act, when to wait</li>
            <li>Relationship readings — where things stand, what the other person intends</li>
            <li>Business and financial questions — specific outcomes, not general advice</li>
            <li>Health matters — trajectory of symptoms, effectiveness of treatment</li>
            <li>Lost objects — location, who has them, whether they&rsquo;ll be returned</li>
        </ul>
        <p><strong>When to avoid:</strong></p>
        <ul style="margin:12px 0 20px 24px;color:var(--text-muted)">
            <li>Questions about other people&rsquo;s private thoughts without their consent</li>
            <li>Matters already decided — once a contract is signed, the oracle won&rsquo;t change it</li>
            <li>Addictive patterns — Liu Yao should not become an obsession</li>
        </ul>
